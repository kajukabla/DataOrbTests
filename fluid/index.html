<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Simulation</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #error {
      display: none;
      position: fixed; inset: 0;
      color: #f88; background: #111;
      font: 1.2rem/1.6 monospace;
      padding: 2rem;
    }
    #settingsToggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.5);
      color: #ddd;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.4s;
      line-height: 1;
      padding: 0;
    }
    #settingsToggle.hidden { opacity: 0; pointer-events: none; }
    #settingsToggle:hover { background: rgba(255,255,255,0.15); }
    #settingsPanel {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100vh;
      z-index: 99;
      transition: right 0.3s ease;
      pointer-events: none;
    }
    #settingsPanel.open { right: 0; }
    #settingsContent {
      pointer-events: auto;
      background: rgba(0,0,0,0.92);
      height: 100%;
      box-sizing: border-box;
      padding: 48px 14px 20px;
      overflow-y: scroll;
      color: #bbb;
      font: 11px/1.6 system-ui, -apple-system, sans-serif;
    }
    #settingsContent::-webkit-scrollbar { width: 6px; }
    #settingsContent::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    #settingsContent::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    #settingsContent::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.35); }
    .setting-group {
      margin-bottom: 10px;
    }
    .setting-group label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
      color: #999;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setting-group .val {
      color: #ccc;
      font-weight: 600;
    }
    .setting-group select,
    .setting-group input[type="range"] {
      width: 100%;
    }
    .setting-group select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ddd;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .setting-group select option { background: #222; color: #ddd; }
    .setting-group input[type="color"] {
      width: 100%;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 1px 2px;
    }
    .setting-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    .setting-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #c90;
      cursor: pointer;
    }
    .randomize-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .randomize-row button {
      flex: 1;
      padding: 6px 4px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font: 10px/1.2 system-ui, -apple-system, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .randomize-row button:hover { background: rgba(255,255,255,0.18); }
    .randomize-row button:active { background: rgba(255,255,255,0.25); }
    .randomize-row button.active {
      background: rgba(204,153,0,0.3);
      border-color: #c90;
      color: #fc0;
    }
    #presetBrowser {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 12px;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #aaa;
      font-size: 13px;
      opacity: 1;
      transition: opacity 0.4s;
    }
    #presetBrowser.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #presetBrowser button {
      background: none;
      border: 1px solid #555;
      color: #aaa;
      padding: 2px 8px;
      cursor: pointer;
      border-radius: 4px;
    }
    #presetBrowser button:hover {
      background: rgba(255,255,255,0.09);
      border-color: #777;
      color: #ddd;
    }
    #presetName {
      min-width: 120px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="faceDebugCanvas" style="position:fixed; inset:0; pointer-events:none; z-index:35; display:none;"></canvas>
  <div id="error"></div>
  <div id="loading" style="position:fixed; inset:0; display:flex; align-items:center;
    justify-content:center; z-index:50; pointer-events:none;">
    <div style="text-align:center; font-family:system-ui,-apple-system,sans-serif;">
      <div id="loadStatus" style="color:#666; font-size:14px;">Initializing...</div>
    </div>
  </div>

  <button id="settingsToggle" title="Settings">&#9881;</button>
  <div id="settingsPanel">
    <div id="settingsContent">
      <div class="randomize-row">
        <button id="randomizeColors">Randomize Colors</button>
        <button id="randomizeParams">Randomize Params</button>
        <button id="autoMorph">Auto Morph</button>
      </div>
      <div class="randomize-row">
        <button id="boRate" title="Press R to toggle. Up=good, Down=bad">Rate Mode</button>
        <button id="boMorph">BO Morph</button>
        <button id="boBest">Best Config</button>
        <button id="boClear">Clear Data</button>
      </div>
      <div class="randomize-row">
        <button id="saveRun">Save Run</button>
        <button id="loadRun">Load Run</button>
        <button id="deleteRun">Delete Run</button>
      </div>
      <div class="randomize-row">
        <button id="saveExample">Save Example</button>
        <button id="loadExample">Load Example</button>
        <button id="deleteExample">Delete Example</button>
      </div>
      <div class="setting-group">
        <label>Sim Dynamics <span class="val" id="simSpeedVal">1.0</span></label>
        <input type="range" id="simSpeed" min="0" max="3" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Master Speed <span class="val" id="masterSpeedVal">1.00</span></label>
        <input type="range" id="masterSpeed" min="0.0" max="1.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Particles</label>
        <select id="particleCountSelect">
          <option value="262144">262K</option>
          <option value="1048576">1M</option>
          <option value="2097152">2M</option>
          <option value="3145728">3M</option>
          <option value="4194304" selected>4M</option>
          <option value="8388608">8M</option>
          <option value="16777216">16M</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Particle Size <span class="val" id="particleSizeVal">0.9</span></label>
        <input type="range" id="particleSize" min="0.1" max="3.0" step="0.01" value="0.9">
      </div>
      <div class="setting-group">
        <label>Glitter Cap <span class="val" id="glitterCapVal">1.00</span></label>
        <input type="range" id="glitterCap" min="0.01" max="3.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Streak Glow <span class="val" id="streakGlowVal">10.0</span></label>
        <input type="range" id="streakGlow" min="0" max="20" step="0.1" value="10.0">
      </div>
      <div class="setting-group">
        <label>Density Size <span class="val" id="densitySizeVal">1.5</span></label>
        <input type="range" id="densitySize" min="0" max="4" step="0.1" value="1.5">
      </div>
      <div class="setting-group">
        <label>Glitter Floor <span class="val" id="glitterFloorVal">0.01</span></label>
        <input type="range" id="glitterFloor" min="0.001" max="0.2" step="0.001" value="0.01">
      </div>
      <div class="setting-group">
        <label>Sphere Mode</label>
        <select id="sphereMode">
          <option value="0" selected>Off</option>
          <option value="1">On</option>
        </select>
      </div>
      <div class="setting-group sphere-setting" style="display:none">
        <label>Shadow Extend <span class="val" id="shadowExtendVal">0.50</span></label>
        <input type="range" id="shadowExtend" min="0.0" max="1.0" step="0.01" value="0.50">
      </div>
      <div class="setting-group sphere-setting" style="display:none">
        <label>Sphere Size <span class="val" id="sphereSizeVal">1.00</span></label>
        <input type="range" id="sphereSize" min="0.5" max="2.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Size Randomness <span class="val" id="sizeRandomnessVal">0.3</span></label>
        <input type="range" id="sizeRandomness" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Glint Brightness <span class="val" id="glintBrightnessVal">0.1</span></label>
        <input type="range" id="glintBrightness" min="0.0" max="1.0" step="0.01" value="0.1">
      </div>
      <div class="setting-group">
        <label>Base Color</label>
        <input type="color" id="baseColor" value="#ff8c1a">
      </div>
      <div class="setting-group">
        <label>Accent Color</label>
        <input type="color" id="accentColor" value="#264dcc">
      </div>
      <div class="setting-group">
        <label>Glitter Base</label>
        <input type="color" id="glitterColor" value="#ffffff">
      </div>
      <div class="setting-group">
        <label>Glitter Accent</label>
        <input type="color" id="glitterAccent" value="#4d80ff">
      </div>
      <div class="setting-group">
        <label>Tip Color</label>
        <input type="color" id="tipColor" value="#ffe680">
      </div>
      <div class="setting-group">
        <label>Glitter Tip</label>
        <input type="color" id="glitterTip" value="#fff2cc">
      </div>
      <div class="setting-group">
        <label>Color Blend <span class="val" id="colorBlendVal">0.5</span></label>
        <input type="range" id="colorBlend" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Prismatic Amount <span class="val" id="prismaticAmountVal">20.0</span></label>
        <input type="range" id="prismaticAmount" min="0.0" max="20.0" step="0.5" value="20.0">
      </div>
      <div class="setting-group">
        <label>Sheen Strength <span class="val" id="sheenStrengthVal">1.5</span></label>
        <input type="range" id="sheenStrength" min="0.0" max="1.0" step="0.01" value="1.5">
      </div>
      <div class="setting-group">
        <label>Metallic <span class="val" id="metallicVal">0.3</span></label>
        <input type="range" id="metallic" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Roughness <span class="val" id="roughnessVal">0.4</span></label>
        <input type="range" id="roughness" min="0.0" max="1.0" step="0.01" value="0.4">
      </div>
      <div class="setting-group">
        <label>Sheen Color</label>
        <input type="color" id="sheenColor" value="#ffe6b3">
      </div>
      <div class="setting-group">
        <label>Click Size <span class="val" id="clickSizeVal">0.5</span></label>
        <input type="range" id="clickSize" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Click Strength <span class="val" id="clickStrengthVal">0.5</span></label>
        <input type="range" id="clickStrength" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Jet Pattern</label>
        <select id="burstBehavior">
          <option value="0" selected>Edge Jets (Wander)</option>
          <option value="1">Inward Ring Jets</option>
          <option value="2">Outward Ring Jets</option>
          <option value="3">Radial Jets</option>
          <option value="4">Rotating Hunters</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Jet Count <span class="val" id="burstCountVal">0</span></label>
        <input type="range" id="burstCount" min="0" max="16" step="1" value="0">
      </div>
      <div class="setting-group">
        <label>Jet Force <span class="val" id="burstForceVal">0.8</span></label>
        <input type="range" id="burstForce" min="0.0" max="8.0" step="0.01" value="0.8">
      </div>
      <div class="setting-group">
        <label>Jet Force Jitter <span class="val" id="burstForceRandomnessVal">0.25</span></label>
        <input type="range" id="burstForceRandomness" min="0.0" max="1.0" step="0.01" value="0.25">
      </div>
      <div class="setting-group">
        <label>Jet Intensity <span class="val" id="burstDyeIntensityVal">1.0</span></label>
        <input type="range" id="burstDyeIntensity" min="0.0" max="3.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Jet Wait (s) <span class="val" id="burstSpeedVal">0.4</span></label>
        <input type="range" id="burstSpeed" min="0.0" max="10.0" step="0.01" value="0.4">
      </div>
      <div class="setting-group">
        <label>Jet Speed <span class="val" id="burstTravelSpeedVal">1.2</span></label>
        <input type="range" id="burstTravelSpeed" min="0.25" max="3.0" step="0.01" value="1.2">
      </div>
      <div class="setting-group">
        <label>Jet Trail Duration <span class="val" id="burstDurationVal">0.8</span></label>
        <input type="range" id="burstDuration" min="0.05" max="32.0" step="0.01" value="0.8">
      </div>
      <div class="setting-group">
        <label>Jet Width <span class="val" id="burstWidthVal">0.35</span></label>
        <input type="range" id="burstWidth" min="0.0" max="12.0" step="0.01" value="0.35">
      </div>
      <div class="setting-group" id="burstRadialAngleGroup">
        <label>Radial Angle <span class="val" id="burstRadialAngleVal">45</span></label>
        <input type="range" id="burstRadialAngle" min="0" max="360" step="1" value="45">
      </div>

      <div style="margin:12px 0 6px; color:#777; font-size:10px; text-transform:uppercase; letter-spacing:0.5px;">Face Effector</div>
      <div class="setting-group">
        <label>Face Dye</label>
        <select id="faceEffectorMode">
          <option value="0">Off</option>
          <option value="1">Points (legacy)</option>
          <option value="2" selected>Mesh</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Face Dye Contribution <span class="val" id="faceDyeContributionVal">1.10</span></label>
        <input type="range" id="faceDyeContribution" min="0.0" max="2.0" step="0.01" value="1.10">
      </div>
      <div class="setting-group">
        <label>Face Dye Fill <span class="val" id="faceDyeFillVal">1.80</span></label>
        <input type="range" id="faceDyeFill" min="0.0" max="3.0" step="0.01" value="1.80">
      </div>
      <div class="setting-group">
        <label>Face Edge Boost <span class="val" id="faceEdgeBoostVal">0.90</span></label>
        <input type="range" id="faceEdgeBoost" min="0.0" max="2.0" step="0.01" value="0.90">
      </div>
      <div class="setting-group">
        <label>Face Flow Carry <span class="val" id="faceFlowCarryVal">0.12</span></label>
        <input type="range" id="faceFlowCarry" min="0.0" max="1.5" step="0.01" value="0.12">
      </div>
      <div class="setting-group">
        <label>Eye Open Size <span class="val" id="faceEyeOpenSizeVal">1.00</span></label>
        <input type="range" id="faceEyeOpenSize" min="0.0" max="2.0" step="0.01" value="1.00">
      </div>
      <div class="setting-group">
        <label>Mouth Open Size <span class="val" id="faceMouthOpenSizeVal">1.00</span></label>
        <input type="range" id="faceMouthOpenSize" min="0.0" max="2.0" step="0.01" value="1.00">
      </div>
      <div class="setting-group">
        <label>Mouth Closed Size <span class="val" id="faceMouthClosedSizeVal">1.00</span></label>
        <input type="range" id="faceMouthClosedSize" min="0.0" max="2.0" step="0.01" value="1.00">
      </div>
      <div class="setting-group">
        <label>Mouth Dye Boost <span class="val" id="faceMouthBoostVal">1.00</span></label>
        <input type="range" id="faceMouthBoost" min="0.0" max="2.0" step="0.01" value="1.00">
      </div>
      <div class="setting-group">
        <label>Face Mask Detail <span class="val" id="faceMaskDetailVal">0.68</span></label>
        <input type="range" id="faceMaskDetail" min="0.2" max="1.0" step="0.01" value="0.68">
      </div>
      <div class="setting-group">
        <label>Face Stamp Size <span class="val" id="faceStampSizeVal">1.35</span></label>
        <input type="range" id="faceStampSize" min="0.5" max="3.0" step="0.01" value="1.35">
      </div>
      <div class="setting-group">
        <label>Mesh Noise Amount <span class="val" id="faceMeshNoiseAmountVal">0.50</span></label>
        <input type="range" id="faceMeshNoiseAmount" min="0.0" max="3.0" step="0.01" value="0.50">
      </div>
      <div class="setting-group">
        <label>Mesh Noise Freq <span class="val" id="faceMeshNoiseFreqVal">12.0</span></label>
        <input type="range" id="faceMeshNoiseFreq" min="1.0" max="60.0" step="0.5" value="12.0">
      </div>
      <div class="setting-group">
        <label>Mesh Noise Speed <span class="val" id="faceMeshNoiseSpeedVal">1.00</span></label>
        <input type="range" id="faceMeshNoiseSpeed" min="0.0" max="5.0" step="0.01" value="1.00">
      </div>
      <div class="setting-group">
        <label>Mesh Noise Dir <span class="val" id="faceMeshNoiseDirVal">0.00</span></label>
        <input type="range" id="faceMeshNoiseDir" min="0.0" max="1.0" step="0.01" value="0.00">
      </div>
      <div class="setting-group">
        <label>Mouth Sim Boost <span class="val" id="faceMouthSimBoostVal">0.30</span></label>
        <input type="range" id="faceMouthSimBoost" min="0.0" max="1.0" step="0.01" value="0.30">
      </div>
      <div class="setting-group">
        <button id="faceTrackingToggle" style="width:100%;">Start Webcam Face Tracking</button>
      </div>
      <div class="setting-group">
        <label>Face Debug</label>
        <select id="faceDebugMode">
          <option value="0" selected>Off</option>
          <option value="1">Mesh + Streams</option>
          <option value="2">Camera + Mesh + Streams</option>
        </select>
      </div>
      <div class="setting-group">
        <label><input type="checkbox" id="faceDyeNoise" checked> Noise Dye (can oscillate)</label>
      </div>
      <div id="faceTrackingStatus" style="color:#666; font-size:10px; line-height:1.35; margin:0 0 8px 0;">Face tracking idle</div>

      <div style="margin:12px 0 6px; color:#777; font-size:10px; text-transform:uppercase; letter-spacing:0.5px;">Noise Field</div>
      <div class="setting-group">
        <label>Noise Strength <span class="val" id="noiseAmountVal">0.00</span></label>
        <input type="range" id="noiseAmount" min="0.0" max="1.0" step="0.01" value="0.00">
      </div>
      <div class="setting-group">
        <label>Noise Type</label>
        <select id="noiseType">
          <option value="0" selected>Classic Curl</option>
          <option value="1">Domain-Warped Curl</option>
          <option value="2">Ridged Fractal</option>
          <option value="3">Voronoi Cellular</option>
          <option value="4">Flow Rotated</option>
          <option value="5">Gabor-Like Streaks</option>
          <option value="6">Hybrid Fractal</option>
          <option value="7">Jupiter Bands</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Noise Mapping</label>
        <select id="noiseMapping">
          <option value="0" selected>Normal (Cartesian)</option>
          <option value="1">Radial Outflow</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Noise Symmetry <span class="val" id="noiseBehaviorVal">0 None</span></label>
        <input type="range" id="noiseBehavior" min="0" max="8" step="1" value="0">
      </div>
      <div class="setting-group">
        <label>Noise Frequency <span class="val" id="noiseFrequencyVal">0.5</span></label>
        <input type="range" id="noiseFrequency" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Noise Speed <span class="val" id="noiseSpeedVal">0.5</span></label>
        <input type="range" id="noiseSpeed" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Domain Warp <span class="val" id="noiseWarpVal">0.35</span></label>
        <input type="range" id="noiseWarp" min="0.0" max="1.0" step="0.01" value="0.35">
      </div>
      <div class="setting-group">
        <label>Fine Detail <span class="val" id="noiseSharpnessVal">0.5</span></label>
        <input type="range" id="noiseSharpness" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Jet Bands <span class="val" id="noiseAnisotropyVal">0.5</span></label>
        <input type="range" id="noiseAnisotropy" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Cellular Breakup <span class="val" id="noiseBlendVal">0.5</span></label>
        <input type="range" id="noiseBlend" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Curl Strength <span class="val" id="curlStrengthVal">15</span></label>
        <input type="range" id="curlStrength" min="0" max="50" step="1" value="15">
      </div>
      <div class="setting-group">
        <label>Noise Dye Intensity <span class="val" id="noiseDyeIntensityVal">0.0</span></label>
        <input type="range" id="noiseDyeIntensity" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Dye Noise <span class="val" id="dyeNoiseAmountVal">0.0</span></label>
        <input type="range" id="dyeNoiseAmount" min="0.0" max="0.15" step="0.001" value="0.0">
      </div>

      <div class="setting-group">
        <label>Vel Dissipation <span class="val" id="velDissipationVal">0.998</span></label>
        <input type="range" id="velDissipation" min="0.99" max="1.0" step="0.001" value="0.998">
      </div>
      <div class="setting-group">
        <label>Dye Dissipation <span class="val" id="dyeDissipationVal">0.993</span></label>
        <input type="range" id="dyeDissipation" min="0.98" max="1.0" step="0.001" value="0.993">
      </div>
      <div class="setting-group">
        <label>Dye Soft Cap <span class="val" id="dyeSoftCapVal">On</span></label>
        <select id="dyeSoftCap"><option value="0">Off</option><option value="1" selected>On</option></select>
      </div>
      <div class="setting-group">
        <label>Dye Ceiling <span class="val" id="dyeCeilingVal">1.2</span></label>
        <input type="range" id="dyeCeiling" min="0.3" max="3.0" step="0.01" value="1.2">
      </div>
      <div class="setting-group">
        <label>Pressure Iters <span class="val" id="pressureItersVal">30</span></label>
        <input type="range" id="pressureIters" min="10" max="60" step="1" value="30">
      </div>
      <div class="setting-group">
        <label>Pressure Decay <span class="val" id="pressureDecayVal">0.8</span></label>
        <input type="range" id="pressureDecay" min="0.0" max="1.0" step="0.01" value="0.8">
      </div>
      <!-- Temperature/Buoyancy -->
      <div class="setting-group">
        <label>Temp Amount <span class="val" id="tempAmountVal">0.00</span></label>
        <input type="range" id="tempAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Temp Buoyancy <span class="val" id="tempBuoyancyVal">0.50</span></label>
        <input type="range" id="tempBuoyancy" min="0.0" max="3.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Temp Dissipation <span class="val" id="tempDissipationVal">0.990</span></label>
        <input type="range" id="tempDissipation" min="0.95" max="1.0" step="0.001" value="0.99">
      </div>
      <div class="setting-group">
        <label>Dye &rarr; Heat <span class="val" id="tempDyeHeatVal">0.00</span></label>
        <input type="range" id="tempDyeHeat" min="0.0" max="3.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Edge Cooling <span class="val" id="tempEdgeCoolVal">0.00</span></label>
        <input type="range" id="tempEdgeCool" min="0.0" max="3.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Radial Buoyancy <span class="val" id="tempRadialMixVal">0.00</span></label>
        <input type="range" id="tempRadialMix" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Heat Color Shift <span class="val" id="tempColorShiftVal">0.00</span></label>
        <input type="range" id="tempColorShift" min="0.0" max="3.0" step="0.01" value="0.0">
      </div>
      <!-- Mood Lighting -->
      <div class="setting-group">
        <label>Mood Amount <span class="val" id="moodAmountVal">0.00</span></label>
        <input type="range" id="moodAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Mood Speed <span class="val" id="moodSpeedVal">0.30</span></label>
        <input type="range" id="moodSpeed" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <!-- Palette -->
      <div class="setting-group">
        <label>Palette <span class="val" id="paletteIndexVal">-1</span></label>
        <input type="range" id="paletteIndex" min="-1" max="49" step="1" value="-1">
      </div>
      <!-- Transfer Function -->
      <div class="setting-group">
        <label>Colormap</label>
        <select id="colormapMode">
          <option value="0">Palette Gradient</option>
          <option value="1">Viridis</option>
          <option value="2">Inferno</option>
          <option value="3">Plasma</option>
          <option value="4">Magma</option>
          <option value="5">Rainbow HDR</option>
          <option value="6">Rainbow HDR Inv</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Color Source</label>
        <select id="colorSource">
          <option value="0">Density</option>
          <option value="1">Velocity</option>
          <option value="2">Pressure</option>
          <option value="3">Vorticity</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Gain <span class="val" id="colorGainVal">0.50</span></label>
        <input type="range" id="colorGain" min="0.0" max="1.0" step="0.01" value="0.50">
      </div>
      <div class="setting-group">
        <label><input type="checkbox" id="colormapCompress"> Auto-Range</label>
      </div>
      <!-- Bloom -->
      <div class="setting-group">
        <label>Bloom Intensity <span class="val" id="bloomIntensityVal">0.00</span></label>
        <input type="range" id="bloomIntensity" min="0.0" max="25.0" step="0.01" value="0.00">
      </div>
      <div class="setting-group">
        <label>Bloom Threshold <span class="val" id="bloomThresholdVal">0.80</span></label>
        <input type="range" id="bloomThreshold" min="0.0" max="1.0" step="0.01" value="0.40">
      </div>
      <div class="setting-group">
        <label>Bloom Radius <span class="val" id="bloomRadiusVal">0.50</span></label>
        <input type="range" id="bloomRadius" min="0.0" max="10.0" step="0.01" value="0.50">
      </div>
    </div>
  </div>

  <script>
    (function() {
      function send(level, args) {
        try {
          fetch('/log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ level, args: args.map(a =>
              typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)
            )}),
          }).catch(() => {});
        } catch {}
      }
      ['log', 'warn', 'error'].forEach(level => {
        const orig = console[level].bind(console);
        console[level] = (...args) => { orig(...args); send(level, args); };
      });
      window.addEventListener('error', e => send('error', [`Uncaught: ${e.message} at ${e.filename}:${e.lineno}`]));
      window.addEventListener('unhandledrejection', e => send('error', [`Unhandled rejection: ${e.reason}`]));
    })();
  </script>
  <div id="boOverlay" style="display:none; position:fixed; bottom:20px; left:50%;
    transform:translateX(-50%); z-index:101; text-align:center; pointer-events:none;">
    <div style="display:flex; gap:32px; justify-content:center; align-items:center;">
      <div style="text-align:center;">
        <div id="boFlashMovement" style="font-size:48px; opacity:0.3; transition:opacity 0.15s; color:#555;">?</div>
        <div style="color:#666; font-size:9px; font-family:system-ui,-apple-system,sans-serif;">↑↓ motion</div>
      </div>
      <div style="text-align:center;">
        <div id="boFlashColor" style="font-size:48px; opacity:0.3; transition:opacity 0.15s; color:#555;">?</div>
        <div style="color:#666; font-size:9px; font-family:system-ui,-apple-system,sans-serif;">←→ color</div>
      </div>
    </div>
    <div id="boCount" style="color:#aaa; font-size:13px; font-family:system-ui,-apple-system,sans-serif; margin-top:4px;"></div>
    <div id="boPhase" style="color:#666; font-size:10px; font-family:system-ui,-apple-system,sans-serif;"></div>
  </div>

  <div id="presetBrowser">
    <button id="presetPrev">&#9664;</button>
    <span id="presetName">&mdash;</span>
    <button id="presetNext">&#9654;</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
