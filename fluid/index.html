<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Simulation</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #error {
      display: none;
      position: fixed; inset: 0;
      color: #f88; background: #111;
      font: 1.2rem/1.6 monospace;
      padding: 2rem;
    }
    #settingsToggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.5);
      color: #ddd;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.4s;
      line-height: 1;
      padding: 0;
    }
    #settingsToggle.hidden { opacity: 0; pointer-events: none; }
    #settingsToggle:hover { background: rgba(255,255,255,0.15); }
    #settingsPanel {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100vh;
      z-index: 99;
      transition: right 0.3s ease;
      pointer-events: none;
    }
    #settingsPanel.open { right: 0; }
    #settingsContent {
      pointer-events: auto;
      background: rgba(0,0,0,0.92);
      height: 100%;
      box-sizing: border-box;
      padding: 48px 14px 20px;
      overflow-y: scroll;
      color: #bbb;
      font: 11px/1.6 system-ui, -apple-system, sans-serif;
    }
    #settingsContent::-webkit-scrollbar { width: 6px; }
    #settingsContent::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    #settingsContent::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    #settingsContent::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.35); }
    .setting-group {
      margin-bottom: 10px;
    }
    .setting-group label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
      color: #999;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setting-group .val {
      color: #ccc;
      font-weight: 600;
    }
    .setting-group select,
    .setting-group input[type="range"] {
      width: 100%;
    }
    .setting-group select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ddd;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .setting-group select option { background: #222; color: #ddd; }
    .setting-group input[type="color"] {
      width: 100%;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 1px 2px;
    }
    .setting-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    .setting-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #c90;
      cursor: pointer;
    }
    .randomize-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .randomize-row button {
      flex: 1;
      padding: 6px 4px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font: 10px/1.2 system-ui, -apple-system, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .randomize-row button:hover { background: rgba(255,255,255,0.18); }
    .randomize-row button:active { background: rgba(255,255,255,0.25); }
    .randomize-row button.active {
      background: rgba(204,153,0,0.3);
      border-color: #c90;
      color: #fc0;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="error"></div>
  <div id="loading" style="position:fixed; inset:0; display:flex; align-items:center;
    justify-content:center; z-index:50; pointer-events:none;">
    <div style="text-align:center; font-family:system-ui,-apple-system,sans-serif;">
      <div id="loadStatus" style="color:#666; font-size:14px;">Initializing...</div>
    </div>
  </div>

  <button id="settingsToggle" title="Settings">&#9881;</button>
  <div id="settingsPanel">
    <div id="settingsContent">
      <div class="randomize-row">
        <button id="randomizeColors">Randomize Colors</button>
        <button id="randomizeParams">Randomize Params</button>
        <button id="autoMorph">Auto Morph</button>
      </div>
      <div class="randomize-row">
        <button id="boRate" title="Press R to toggle. Up=good, Down=bad">Rate Mode</button>
        <button id="boMorph">BO Morph</button>
        <button id="boBest">Best Config</button>
        <button id="boClear">Clear Data</button>
      </div>
      <div class="randomize-row">
        <button id="saveRun">Save Run</button>
        <button id="loadRun">Load Run</button>
        <button id="deleteRun">Delete Run</button>
      </div>
      <div class="randomize-row">
        <button id="saveExample">Save Example</button>
        <button id="loadExample">Load Example</button>
        <button id="deleteExample">Delete Example</button>
      </div>
      <div class="randomize-row">
        <button id="useRecordingsBtn">Use Recordings</button>
        <button id="clearRecordingsBtn">Clear Recordings</button>
      </div>
      <div class="setting-group">
        <label>Sim Speed <span class="val" id="simSpeedVal">1.0</span></label>
        <input type="range" id="simSpeed" min="0" max="3" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Particles</label>
        <select id="particleCountSelect">
          <option value="262144">262K</option>
          <option value="1048576">1M</option>
          <option value="2097152">2M</option>
          <option value="3145728">3M</option>
          <option value="4194304" selected>4M</option>
          <option value="8388608">8M</option>
          <option value="16777216">16M</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Particle Size <span class="val" id="particleSizeVal">0.9</span></label>
        <input type="range" id="particleSize" min="0.1" max="3.0" step="0.01" value="0.9">
      </div>
      <div class="setting-group">
        <label>Size Randomness <span class="val" id="sizeRandomnessVal">0.3</span></label>
        <input type="range" id="sizeRandomness" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Glint Brightness <span class="val" id="glintBrightnessVal">0.1</span></label>
        <input type="range" id="glintBrightness" min="0.0" max="1.0" step="0.01" value="0.1">
      </div>
      <div class="setting-group">
        <label>Base Color</label>
        <input type="color" id="baseColor" value="#ff8c1a">
      </div>
      <div class="setting-group">
        <label>Accent Color</label>
        <input type="color" id="accentColor" value="#264dcc">
      </div>
      <div class="setting-group">
        <label>Glitter Base</label>
        <input type="color" id="glitterColor" value="#ffffff">
      </div>
      <div class="setting-group">
        <label>Glitter Accent</label>
        <input type="color" id="glitterAccent" value="#4d80ff">
      </div>
      <div class="setting-group">
        <label>Tip Color</label>
        <input type="color" id="tipColor" value="#ffe680">
      </div>
      <div class="setting-group">
        <label>Glitter Tip</label>
        <input type="color" id="glitterTip" value="#fff2cc">
      </div>
      <div class="setting-group">
        <label>Color Blend <span class="val" id="colorBlendVal">0.5</span></label>
        <input type="range" id="colorBlend" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Prismatic Amount <span class="val" id="prismaticAmountVal">20.0</span></label>
        <input type="range" id="prismaticAmount" min="0.0" max="20.0" step="0.5" value="20.0">
      </div>
      <div class="setting-group">
        <label>Sheen Strength <span class="val" id="sheenStrengthVal">1.5</span></label>
        <input type="range" id="sheenStrength" min="0.0" max="1.0" step="0.01" value="1.5">
      </div>
      <div class="setting-group">
        <label>Metallic <span class="val" id="metallicVal">0.3</span></label>
        <input type="range" id="metallic" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Roughness <span class="val" id="roughnessVal">0.4</span></label>
        <input type="range" id="roughness" min="0.0" max="1.0" step="0.01" value="0.4">
      </div>
      <div class="setting-group">
        <label>Sheen Color</label>
        <input type="color" id="sheenColor" value="#ffe6b3">
      </div>
      <!-- Glass marble sliders (commented out)
      <div class="setting-group">
        <label>Rim Intensity <span class="val" id="rimIntensityVal">0.5</span></label>
        <input type="range" id="rimIntensity" min="0.0" max="2.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Chromatic Strength <span class="val" id="chromaticStrengthVal">1.0</span></label>
        <input type="range" id="chromaticStrength" min="0.0" max="2.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Caustic Intensity <span class="val" id="causticIntensityVal">0.2</span></label>
        <input type="range" id="causticIntensity" min="0.0" max="1.0" step="0.01" value="0.2">
      </div>
      -->
      <div class="setting-group">
        <label>Click Size <span class="val" id="clickSizeVal">0.5</span></label>
        <input type="range" id="clickSize" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Click Strength <span class="val" id="clickStrengthVal">0.5</span></label>
        <input type="range" id="clickStrength" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Injector Intensity <span class="val" id="injectorIntensityVal">1.0</span></label>
        <input type="range" id="injectorIntensity" min="0.0" max="1.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Injector Size <span class="val" id="injectorSizeVal">0.5</span></label>
        <input type="range" id="injectorSize" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Injector Count <span class="val" id="injectorCountVal">4</span></label>
        <input type="range" id="injectorCount" min="0" max="8" step="1" value="4">
      </div>
      <div class="setting-group">
        <label>Injector Speed <span class="val" id="injectorSpeedVal">0.5</span></label>
        <input type="range" id="injectorSpeed" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Burst Count <span class="val" id="burstCountVal">3</span></label>
        <input type="range" id="burstCount" min="0" max="8" step="1" value="3">
      </div>
      <div class="setting-group">
        <label>Noise Amount <span class="val" id="noiseAmountVal">0.0</span></label>
        <input type="range" id="noiseAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Noise Frequency <span class="val" id="noiseFrequencyVal">0.5</span></label>
        <input type="range" id="noiseFrequency" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Noise Speed <span class="val" id="noiseSpeedVal">0.5</span></label>
        <input type="range" id="noiseSpeed" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Curl Strength <span class="val" id="curlStrengthVal">15</span></label>
        <input type="range" id="curlStrength" min="0" max="50" step="1" value="15">
      </div>
      <div class="setting-group">
        <label>Splat Force <span class="val" id="splatForceVal">6000</span></label>
        <input type="range" id="splatForce" min="1000" max="20000" step="100" value="6000">
      </div>
      <div class="setting-group">
        <label>Vel Dissipation <span class="val" id="velDissipationVal">0.998</span></label>
        <input type="range" id="velDissipation" min="0.99" max="1.0" step="0.001" value="0.998">
      </div>
      <div class="setting-group">
        <label>Dye Dissipation <span class="val" id="dyeDissipationVal">0.993</span></label>
        <input type="range" id="dyeDissipation" min="0.98" max="1.0" step="0.001" value="0.993">
      </div>
      <div class="setting-group">
        <label>Pressure Iters <span class="val" id="pressureItersVal">30</span></label>
        <input type="range" id="pressureIters" min="10" max="60" step="1" value="30">
      </div>
      <div class="setting-group">
        <label>Pressure Decay <span class="val" id="pressureDecayVal">0.8</span></label>
        <input type="range" id="pressureDecay" min="0.0" max="1.0" step="0.01" value="0.8">
      </div>
      <div class="setting-group">
        <label>Draw Bot Count <span class="val" id="drawBotCountVal">0</span></label>
        <input type="range" id="drawBotCount" min="0" max="8" step="1" value="0">
      </div>
      <div class="setting-group">
        <label>Draw Bot Speed <span class="val" id="drawBotSpeedVal">0.5</span></label>
        <input type="range" id="drawBotSpeed" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Draw Bot Size <span class="val" id="drawBotSizeVal">3.0</span></label>
        <input type="range" id="drawBotSize" min="0.01" max="5.0" step="0.01" value="3.0">
      </div>
      <div class="setting-group">
        <label>Draw Bot Turn Rate <span class="val" id="drawBotTurnRateVal">0.5</span></label>
        <input type="range" id="drawBotTurnRate" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Draw Bot Speed Var <span class="val" id="drawBotSpeedVarVal">0.5</span></label>
        <input type="range" id="drawBotSpeedVar" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Draw Bot Rec Mix <span class="val" id="drawBotRecMixVal">0.5</span></label>
        <input type="range" id="drawBotRecMix" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Draw Bot Chaos <span class="val" id="drawBotChaosVal">0.3</span></label>
        <input type="range" id="drawBotChaos" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Draw Bot Drift <span class="val" id="drawBotDriftVal">0.5</span></label>
        <input type="range" id="drawBotDrift" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <!-- Blobs -->
      <div class="setting-group">
        <label>Blob Count <span class="val" id="blobCountVal">0</span></label>
        <input type="range" id="blobCount" min="0" max="4" step="1" value="0">
      </div>
      <div class="setting-group">
        <label>Blob Speed <span class="val" id="blobSpeedVal">0.3</span></label>
        <input type="range" id="blobSpeed" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Blob Size <span class="val" id="blobSizeVal">0.7</span></label>
        <input type="range" id="blobSize" min="0.0" max="1.0" step="0.01" value="0.7">
      </div>
      <div class="setting-group">
        <label>Blob Wander <span class="val" id="blobWanderVal">0.5</span></label>
        <input type="range" id="blobWander" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <!-- Flockers -->
      <div class="setting-group">
        <label>Flock Count <span class="val" id="flockCountVal">0</span></label>
        <input type="range" id="flockCount" min="0" max="50" step="1" value="0">
      </div>
      <div class="setting-group">
        <label>Flock Speed <span class="val" id="flockSpeedVal">0.5</span></label>
        <input type="range" id="flockSpeed" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Flock Size <span class="val" id="flockSizeVal">0.3</span></label>
        <input type="range" id="flockSize" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Flock Separation <span class="val" id="flockSeparationVal">0.6</span></label>
        <input type="range" id="flockSeparation" min="0.0" max="1.0" step="0.01" value="0.6">
      </div>
      <div class="setting-group">
        <label>Flock Alignment <span class="val" id="flockAlignmentVal">0.4</span></label>
        <input type="range" id="flockAlignment" min="0.0" max="1.0" step="0.01" value="0.4">
      </div>
      <div class="setting-group">
        <label>Flock Cohesion <span class="val" id="flockCohesionVal">0.5</span></label>
        <input type="range" id="flockCohesion" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Flock↔Blob React <span class="val" id="flockBlobReactVal">0.3</span></label>
        <input type="range" id="flockBlobReact" min="-1.0" max="1.0" step="0.01" value="0.3">
      </div>
      <!-- Dye Noise -->
      <div class="setting-group">
        <label>Noise Dye Intensity <span class="val" id="noiseDyeIntensityVal">0.0</span></label>
        <input type="range" id="noiseDyeIntensity" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Dye Noise <span class="val" id="dyeNoiseAmountVal">0.0</span></label>
        <input type="range" id="dyeNoiseAmount" min="0.0" max="0.15" step="0.001" value="0.0">
      </div>
      <!-- Reaction-Diffusion -->
      <div class="setting-group">
        <label>RD Amount <span class="val" id="rdAmountVal">0.00</span></label>
        <input type="range" id="rdAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>RD Feed Rate <span class="val" id="rdFeedRateVal">0.04</span></label>
        <input type="range" id="rdFeedRate" min="0.01" max="0.08" step="0.001" value="0.04">
      </div>
      <div class="setting-group">
        <label>RD Kill Rate <span class="val" id="rdKillRateVal">0.06</span></label>
        <input type="range" id="rdKillRate" min="0.04" max="0.07" step="0.001" value="0.06">
      </div>
      <div class="setting-group">
        <label>RD Dye Amount <span class="val" id="rdDyeAmountVal">0.00</span></label>
        <input type="range" id="rdDyeAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>RD Force <span class="val" id="rdForceAmountVal">0.00</span></label>
        <input type="range" id="rdForceAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>RD Scale <span class="val" id="rdScaleVal">0.50</span></label>
        <input type="range" id="rdScale" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <!-- Temperature/Buoyancy -->
      <div class="setting-group">
        <label>Temp Amount <span class="val" id="tempAmountVal">0.00</span></label>
        <input type="range" id="tempAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Temp Buoyancy <span class="val" id="tempBuoyancyVal">0.50</span></label>
        <input type="range" id="tempBuoyancy" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Temp Dissipation <span class="val" id="tempDissipationVal">0.990</span></label>
        <input type="range" id="tempDissipation" min="0.95" max="1.0" step="0.001" value="0.99">
      </div>
      <div class="setting-group">
        <label>Temp Dye Tint <span class="val" id="tempDyeTintVal">0.00</span></label>
        <input type="range" id="tempDyeTint" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <!-- Chemotaxis -->
      <div class="setting-group">
        <label>Flock Chemotaxis <span class="val" id="flockChemotaxisVal">0.00</span></label>
        <input type="range" id="flockChemotaxis" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <!-- Depth/Parallax -->
      <div class="setting-group">
        <label>Depth Amount <span class="val" id="depthAmountVal">0.00</span></label>
        <input type="range" id="depthAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Depth Speed <span class="val" id="depthSpeedVal">0.30</span></label>
        <input type="range" id="depthSpeed" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <!-- Mood Lighting -->
      <div class="setting-group">
        <label>Mood Amount <span class="val" id="moodAmountVal">0.00</span></label>
        <input type="range" id="moodAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Mood Speed <span class="val" id="moodSpeedVal">0.30</span></label>
        <input type="range" id="moodSpeed" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <!-- Palette -->
      <div class="setting-group">
        <label>Palette <span class="val" id="paletteIndexVal">-1</span></label>
        <input type="range" id="paletteIndex" min="-1" max="49" step="1" value="-1">
      </div>
      <!-- Bloom -->
      <div class="setting-group">
        <label>Bloom Intensity <span class="val" id="bloomIntensityVal">0.00</span></label>
        <input type="range" id="bloomIntensity" min="0.0" max="25.0" step="0.01" value="0.00">
      </div>
      <div class="setting-group">
        <label>Bloom Threshold <span class="val" id="bloomThresholdVal">0.80</span></label>
        <input type="range" id="bloomThreshold" min="0.0" max="1.0" step="0.01" value="0.40">
      </div>
      <div class="setting-group">
        <label>Bloom Radius <span class="val" id="bloomRadiusVal">0.50</span></label>
        <input type="range" id="bloomRadius" min="0.0" max="10.0" step="0.01" value="0.50">
      </div>
    </div>
  </div>

  <script>
    (function() {
      function send(level, args) {
        try {
          fetch('/log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ level, args: args.map(a =>
              typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)
            )}),
          }).catch(() => {});
        } catch {}
      }
      ['log', 'warn', 'error'].forEach(level => {
        const orig = console[level].bind(console);
        console[level] = (...args) => { orig(...args); send(level, args); };
      });
      window.addEventListener('error', e => send('error', [`Uncaught: ${e.message} at ${e.filename}:${e.lineno}`]));
      window.addEventListener('unhandledrejection', e => send('error', [`Unhandled rejection: ${e.reason}`]));
    })();
  </script>
  <div id="recordingOverlay" style="display:none; position:fixed; top:20px; left:50%;
    transform:translateX(-50%); z-index:102; text-align:center; pointer-events:none;
    font-family:system-ui,-apple-system,sans-serif;">
    <span style="display:inline-block; width:12px; height:12px; border-radius:50%;
      background:#f44; animation:recPulse 1s infinite;"></span>
    <span id="recordingText" style="color:#f44; font-size:14px; font-weight:600; margin-left:8px;">RECORDING</span>
    <span id="recordingCount" style="color:#aaa; font-size:12px; margin-left:8px;"></span>
    <style>@keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }</style>
  </div>

  <div id="boOverlay" style="display:none; position:fixed; bottom:20px; left:50%;
    transform:translateX(-50%); z-index:101; text-align:center; pointer-events:none;">
    <div style="display:flex; gap:32px; justify-content:center; align-items:center;">
      <div style="text-align:center;">
        <div id="boFlashMovement" style="font-size:48px; opacity:0.3; transition:opacity 0.15s; color:#555;">?</div>
        <div style="color:#666; font-size:9px; font-family:system-ui,-apple-system,sans-serif;">↑↓ motion</div>
      </div>
      <div style="text-align:center;">
        <div id="boFlashColor" style="font-size:48px; opacity:0.3; transition:opacity 0.15s; color:#555;">?</div>
        <div style="color:#666; font-size:9px; font-family:system-ui,-apple-system,sans-serif;">←→ color</div>
      </div>
    </div>
    <div id="boCount" style="color:#aaa; font-size:13px; font-family:system-ui,-apple-system,sans-serif; margin-top:4px;"></div>
    <div id="boPhase" style="color:#666; font-size:10px; font-family:system-ui,-apple-system,sans-serif;"></div>
  </div>

  <div id="presetBrowser" style="position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:100; display:flex; gap:12px; align-items:center; font-family:system-ui; color:#aaa; font-size:13px;">
    <button id="presetPrev" style="background:none; border:1px solid #555; color:#aaa; padding:2px 8px; cursor:pointer; border-radius:4px;">&#9664;</button>
    <span id="presetName" style="min-width:120px; text-align:center;">&mdash;</span>
    <button id="presetNext" style="background:none; border:1px solid #555; color:#aaa; padding:2px 8px; cursor:pointer; border-radius:4px;">&#9654;</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
