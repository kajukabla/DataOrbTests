<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Simulation</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #error {
      display: none;
      position: fixed; inset: 0;
      color: #f88; background: #111;
      font: 1.2rem/1.6 monospace;
      padding: 2rem;
    }
    #settingsToggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.5);
      color: #ddd;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.4s;
      line-height: 1;
      padding: 0;
    }
    #settingsToggle.hidden { opacity: 0; pointer-events: none; }
    #settingsToggle:hover { background: rgba(255,255,255,0.15); }
    #settingsPanel {
      position: fixed;
      top: 0;
      right: -260px;
      width: 260px;
      height: 100vh;
      z-index: 99;
      transition: right 0.3s ease;
      pointer-events: none;
    }
    #settingsPanel.open { right: 0; }
    #settingsContent {
      pointer-events: auto;
      background: rgba(0,0,0,0.92);
      height: 100%;
      padding: 48px 14px 14px;
      overflow-y: auto;
      color: #bbb;
      font: 11px/1.6 system-ui, -apple-system, sans-serif;
    }
    .setting-group {
      margin-bottom: 10px;
    }
    .setting-group label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
      color: #999;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setting-group .val {
      color: #ccc;
      font-weight: 600;
    }
    .setting-group select,
    .setting-group input[type="range"] {
      width: 100%;
    }
    .setting-group select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ddd;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .setting-group select option { background: #222; color: #ddd; }
    .setting-group input[type="color"] {
      width: 100%;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 1px 2px;
    }
    .setting-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    .setting-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #c90;
      cursor: pointer;
    }
    .randomize-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .randomize-row button {
      flex: 1;
      padding: 6px 4px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font: 10px/1.2 system-ui, -apple-system, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .randomize-row button:hover { background: rgba(255,255,255,0.18); }
    .randomize-row button:active { background: rgba(255,255,255,0.25); }
    .randomize-row button.active {
      background: rgba(204,153,0,0.3);
      border-color: #c90;
      color: #fc0;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="error"></div>

  <button id="settingsToggle" title="Settings">&#9881;</button>
  <div id="settingsPanel">
    <div id="settingsContent">
      <div class="randomize-row">
        <button id="randomizeColors">Randomize Colors</button>
        <button id="randomizeParams">Randomize Params</button>
        <button id="autoMorph">Auto Morph</button>
      </div>
      <div class="setting-group">
        <label>Sim Speed <span class="val" id="simSpeedVal">1.0</span></label>
        <input type="range" id="simSpeed" min="0" max="3" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Particles</label>
        <select id="particleCountSelect">
          <option value="262144">262K</option>
          <option value="1048576">1M</option>
          <option value="4194304" selected>4M</option>
          <option value="8388608">8M</option>
          <option value="16777216">16M</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Particle Size <span class="val" id="particleSizeVal">0.6</span></label>
        <input type="range" id="particleSize" min="0.3" max="4.0" step="0.1" value="0.6">
      </div>
      <div class="setting-group">
        <label>Glint Brightness <span class="val" id="glintBrightnessVal">1.2</span></label>
        <input type="range" id="glintBrightness" min="0.1" max="5.0" step="0.1" value="1.2">
      </div>
      <div class="setting-group">
        <label>Size Randomness <span class="val" id="sizeRandomnessVal">0.3</span></label>
        <input type="range" id="sizeRandomness" min="0.0" max="1.0" step="0.01" value="0.3">
      </div>
      <div class="setting-group">
        <label>Base Color</label>
        <input type="color" id="baseColor" value="#ff8c1a">
      </div>
      <div class="setting-group">
        <label>Accent Color</label>
        <input type="color" id="accentColor" value="#264dcc">
      </div>
      <div class="setting-group">
        <label>Glitter Base</label>
        <input type="color" id="glitterColor" value="#ffffff">
      </div>
      <div class="setting-group">
        <label>Glitter Accent</label>
        <input type="color" id="glitterAccent" value="#4d80ff">
      </div>
      <div class="setting-group">
        <label>Tip Color</label>
        <input type="color" id="tipColor" value="#ffe680">
      </div>
      <div class="setting-group">
        <label>Glitter Tip</label>
        <input type="color" id="glitterTip" value="#fff2cc">
      </div>
      <div class="setting-group">
        <label>Color Blend <span class="val" id="colorBlendVal">0.5</span></label>
        <input type="range" id="colorBlend" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Prismatic Amount <span class="val" id="prismaticAmountVal">5.0</span></label>
        <input type="range" id="prismaticAmount" min="0.0" max="20.0" step="0.5" value="5.0">
      </div>
      <div class="setting-group">
        <label>Sheen Strength <span class="val" id="sheenStrengthVal">1.5</span></label>
        <input type="range" id="sheenStrength" min="0.0" max="1.0" step="0.01" value="1.5">
      </div>
      <div class="setting-group">
        <label>Sheen Color</label>
        <input type="color" id="sheenColor" value="#ffe6b3">
      </div>
      <!-- Glass marble sliders (commented out)
      <div class="setting-group">
        <label>Rim Intensity <span class="val" id="rimIntensityVal">0.5</span></label>
        <input type="range" id="rimIntensity" min="0.0" max="2.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Chromatic Strength <span class="val" id="chromaticStrengthVal">1.0</span></label>
        <input type="range" id="chromaticStrength" min="0.0" max="2.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Caustic Intensity <span class="val" id="causticIntensityVal">0.2</span></label>
        <input type="range" id="causticIntensity" min="0.0" max="1.0" step="0.01" value="0.2">
      </div>
      -->
      <div class="setting-group">
        <label>Click Size <span class="val" id="clickSizeVal">0.5</span></label>
        <input type="range" id="clickSize" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Click Strength <span class="val" id="clickStrengthVal">0.5</span></label>
        <input type="range" id="clickStrength" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Injector Intensity <span class="val" id="injectorIntensityVal">1.0</span></label>
        <input type="range" id="injectorIntensity" min="0.0" max="1.0" step="0.01" value="1.0">
      </div>
      <div class="setting-group">
        <label>Injector Size <span class="val" id="injectorSizeVal">0.5</span></label>
        <input type="range" id="injectorSize" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Injector Count <span class="val" id="injectorCountVal">4</span></label>
        <input type="range" id="injectorCount" min="0" max="8" step="1" value="4">
      </div>
      <div class="setting-group">
        <label>Injector Speed <span class="val" id="injectorSpeedVal">0.5</span></label>
        <input type="range" id="injectorSpeed" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Burst Count <span class="val" id="burstCountVal">3</span></label>
        <input type="range" id="burstCount" min="0" max="8" step="1" value="3">
      </div>
      <div class="setting-group">
        <label>Noise Amount <span class="val" id="noiseAmountVal">0.0</span></label>
        <input type="range" id="noiseAmount" min="0.0" max="1.0" step="0.01" value="0.0">
      </div>
      <div class="setting-group">
        <label>Noise Frequency <span class="val" id="noiseFrequencyVal">0.5</span></label>
        <input type="range" id="noiseFrequency" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Noise Speed <span class="val" id="noiseSpeedVal">0.5</span></label>
        <input type="range" id="noiseSpeed" min="0.0" max="1.0" step="0.01" value="0.5">
      </div>
      <div class="setting-group">
        <label>Curl Strength <span class="val" id="curlStrengthVal">15</span></label>
        <input type="range" id="curlStrength" min="0" max="50" step="1" value="15">
      </div>
      <div class="setting-group">
        <label>Splat Force <span class="val" id="splatForceVal">6000</span></label>
        <input type="range" id="splatForce" min="1000" max="20000" step="100" value="6000">
      </div>
      <div class="setting-group">
        <label>Vel Dissipation <span class="val" id="velDissipationVal">0.998</span></label>
        <input type="range" id="velDissipation" min="0.99" max="1.0" step="0.001" value="0.998">
      </div>
      <div class="setting-group">
        <label>Dye Dissipation <span class="val" id="dyeDissipationVal">0.993</span></label>
        <input type="range" id="dyeDissipation" min="0.98" max="1.0" step="0.001" value="0.993">
      </div>
      <div class="setting-group">
        <label>Pressure Iters <span class="val" id="pressureItersVal">30</span></label>
        <input type="range" id="pressureIters" min="10" max="60" step="1" value="30">
      </div>
      <div class="setting-group">
        <label>Pressure Decay <span class="val" id="pressureDecayVal">0.8</span></label>
        <input type="range" id="pressureDecay" min="0.0" max="1.0" step="0.01" value="0.8">
      </div>
    </div>
  </div>

  <script>
    (function() {
      function send(level, args) {
        try {
          fetch('/log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ level, args: args.map(a =>
              typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)
            )}),
          }).catch(() => {});
        } catch {}
      }
      ['log', 'warn', 'error'].forEach(level => {
        const orig = console[level].bind(console);
        console[level] = (...args) => { orig(...args); send(level, args); };
      });
      window.addEventListener('error', e => send('error', [`Uncaught: ${e.message} at ${e.filename}:${e.lineno}`]));
      window.addEventListener('unhandledrejection', e => send('error', [`Unhandled rejection: ${e.reason}`]));
    })();
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
